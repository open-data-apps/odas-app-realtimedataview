<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Hintergrund-Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7eb8f7"/>
      <stop offset="100%" stop-color="#3d3fa5"/>
    </linearGradient>
    <!-- Schatten-Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Hintergrund -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Optional: Glanz-Overlay oben-links -->
  <ellipse cx="160" cy="140" rx="180" ry="160" fill="white" fill-opacity="0.07"/>

  <!-- Motiv: Echtzeit-Daten (Liniendiagramm mit Live-Indikator) -->
  <g filter="url(#shadow)">
    <!-- Diagramm-Achsen -->
    <path d="M 120 400 L 400 400" stroke="#ffffff" stroke-width="24" stroke-linecap="round" fill="none"/>
    <path d="M 120 120 L 120 400" stroke="#ffffff" stroke-width="24" stroke-linecap="round" fill="none"/>
    
    <!-- Verlaufslinie -->
    <path d="M 120 340 L 190 250 L 260 280 L 330 160 L 390 180" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Datenpunkte -->
    <circle cx="190" cy="250" r="22" fill="#ffffff" />
    <circle cx="260" cy="280" r="22" fill="#ffffff" />
    <circle cx="330" cy="160" r="22" fill="#ffffff" />
    
    <!-- Live/Ping Punkt (aktuellster Datenpunkt) -->
    <circle cx="390" cy="180" r="28" fill="#ffffff" />
    
    <!-- Radar/Ping Wellen -->
    <circle cx="390" cy="180" r="54" stroke="#ffffff" stroke-width="8" stroke-opacity="0.6" fill="none" />
    <circle cx="390" cy="180" r="82" stroke="#ffffff" stroke-width="6" stroke-opacity="0.3" fill="none" />
  </g>
</svg>